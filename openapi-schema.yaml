components:
  schemas:
    ACMEIssuer:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        provisioning_uid:
          type: string
          readOnly: true
          nullable: true
        name:
          type: string
        description:
          type: string
        version:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        directory_url:
          type: string
          format: uri
          maxLength: 200
        key_size:
          type: integer
          maximum: 2147483647
          minimum: 0
        key_type:
          $ref: '#/components/schemas/KeyTypeEnum'
        usage_flags:
          allOf:
          - $ref: '#/components/schemas/KeyUsageEnum'
          description: |-
            A bitmask indicating the use of the key.

            * `0` - None (0)
            * `1` - Signing (1)
            * `4` - Encryption (4)
            * `5` - Signing & Encryption (1 | 4 = 5)
          minimum: -2147483648
          maximum: 2147483647
        extended_key_usage:
          type: array
          items:
            type: string
            minLength: 3
        hardware_bound:
          type: boolean
        attest:
          type: boolean
        backend:
          $ref: '#/components/schemas/CertIssuerBackendEnum'
        digicert_kwargs:
          allOf:
          - $ref: '#/components/schemas/Digicert'
          nullable: true
        ident_kwargs:
          allOf:
          - $ref: '#/components/schemas/IDent'
          nullable: true
        microsoft_ca_kwargs:
          allOf:
          - $ref: '#/components/schemas/MicrosoftCA'
          nullable: true
        okta_ca_kwargs:
          allOf:
          - $ref: '#/components/schemas/OktaCA'
          nullable: true
        static_challenge_kwargs:
          allOf:
          - $ref: '#/components/schemas/StaticChallenge'
          nullable: true
      required:
      - backend
      - created_at
      - directory_url
      - id
      - key_size
      - key_type
      - name
      - provisioning_uid
      - updated_at
      - version
    ACMEIssuerRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        directory_url:
          type: string
          format: uri
          minLength: 1
          maxLength: 200
        key_size:
          type: integer
          maximum: 2147483647
          minimum: 0
        key_type:
          $ref: '#/components/schemas/KeyTypeEnum'
        usage_flags:
          allOf:
          - $ref: '#/components/schemas/KeyUsageEnum'
          description: |-
            A bitmask indicating the use of the key.

            * `0` - None (0)
            * `1` - Signing (1)
            * `4` - Encryption (4)
            * `5` - Signing & Encryption (1 | 4 = 5)
          minimum: -2147483648
          maximum: 2147483647
        extended_key_usage:
          type: array
          items:
            type: string
            minLength: 3
        hardware_bound:
          type: boolean
        attest:
          type: boolean
        backend:
          $ref: '#/components/schemas/CertIssuerBackendEnum'
        digicert_kwargs:
          allOf:
          - $ref: '#/components/schemas/DigicertRequest'
          nullable: true
        ident_kwargs:
          allOf:
          - $ref: '#/components/schemas/IDentRequest'
          nullable: true
        microsoft_ca_kwargs:
          allOf:
          - $ref: '#/components/schemas/MicrosoftCARequest'
          nullable: true
        okta_ca_kwargs:
          allOf:
          - $ref: '#/components/schemas/OktaCARequest'
          nullable: true
        static_challenge_kwargs:
          allOf:
          - $ref: '#/components/schemas/StaticChallengeRequest'
          nullable: true
      required:
      - backend
      - directory_url
      - key_size
      - key_type
      - name
    AWSBaseAuth:
      type: object
      properties:
        region_name:
          type: string
          minLength: 1
        aws_access_key_id:
          type: string
          nullable: true
        aws_secret_access_key:
          type: string
          nullable: true
      required:
      - region_name
    AWSBaseAuthRequest:
      type: object
      properties:
        region_name:
          type: string
          minLength: 1
        aws_access_key_id:
          type: string
          nullable: true
          minLength: 1
        aws_secret_access_key:
          type: string
          nullable: true
          minLength: 1
      required:
      - region_name
    AccessibleEnum:
      enum:
      - Default
      - AfterFirstUnlock
      type: string
      description: |-
        * `Default` - Default
        * `AfterFirstUnlock` - After first unlock
    Action:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        backend:
          $ref: '#/components/schemas/ActionBackendEnum'
        name:
          type: string
        description:
          type: string
        http_post_kwargs:
          allOf:
          - $ref: '#/components/schemas/HTTPPostAction'
          nullable: true
        slack_incoming_webhook_kwargs:
          allOf:
