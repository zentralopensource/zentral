          type: string
          nullable: true
          maxLength: 80
        admin_short_name:
          type: string
          nullable: true
          maxLength: 32
        hidden_admin:
          type: boolean
        admin_password_complexity:
          type: integer
          maximum: 3
          minimum: 1
        admin_password_rotation_delay:
          type: integer
          maximum: 1440
          minimum: 0
          description: When an admin password is read, delay in minutes after which
            a command to rotate the password on the device will be scheduled. 60 min
            by default, 1 day max (1440 min). If 0, no automatic password rotation
            will be scheduled.
        name:
          type: string
          maxLength: 125
        allow_pairing:
          type: boolean
          description: Allow the device to connect to other computers. In iOS 13,
            this property was deprecated.
        auto_advance_setup:
          type: boolean
          description: If set to true, the device will tell Setup Assistant to automatically
            advance though its screens.
        await_device_configured:
          type: boolean
          description: If true, the device will not continue in Setup Assistant until
            the MDM server sends a command that states the device is configured. Required
            when using the authenticated user details or for the extra admin.
        department:
          type: string
          maxLength: 125
        is_mandatory:
          type: boolean
          description: If true, the user may not skip applying the profile returned
            by the MDM server.
        is_mdm_removable:
          type: boolean
          description: If false, the MDM payload delivered by the configuration URL
            cannot be removed by the user via the user interface on the device.
        is_multi_user:
          type: boolean
          description: If true, tells the device to configure for Shared iPad.
        is_supervised:
          type: boolean
          description: If true, the device must be supervised. In iOS 13, all DEP
            devices are supervised and the OS will ignore this.
        language:
          oneOf:
          - $ref: '#/components/schemas/LanguageEnum'
          - $ref: '#/components/schemas/BlankEnum'
        org_magic:
          type: string
          maxLength: 256
        region:
          oneOf:
          - $ref: '#/components/schemas/RegionEnum'
          - $ref: '#/components/schemas/BlankEnum'
        skip_setup_items:
          type: array
          items:
            type: string
            maxLength: 64
        support_email_address:
          type: string
          format: email
          maxLength: 250
        support_phone_number:
          type: string
          maxLength: 50
        include_tls_certificates:
          type: boolean
          title: Include anchor certs
          description: If true, only the configured TLS certificates for the Zentral
            instance will be used by the device when evaluating the trust of the connection
            to the MDM server URL. Otherwise, the device uses the built-in root certificates.
        ios_max_version:
          type: string
          title: Max. required iOS version
          maxLength: 32
        ios_min_version:
          type: string
          title: Min. required iOS version
          maxLength: 32
        macos_max_version:
          type: string
          title: Max. required macOS version
          maxLength: 32
        macos_min_version:
          type: string
          title: Min. required macOS version
          maxLength: 32
        push_certificate:
          type: integer
        acme_issuer:
          type: string
          format: uuid
          nullable: true
        scep_issuer:
          type: string
          format: uuid
        blueprint:
          type: integer
          nullable: true
        realm:
          type: string
          format: uuid
          nullable: true
        virtual_server:
          type: integer
      required:
      - enrollment_secret
      - id
      - name
      - push_certificate
      - scep_issuer
      - virtual_server
