        description: Anzahl der pro Seite zurückzugebenden Ergebnisse.
        schema:
          type: integer
      - in: query
        name: name
        schema:
          type: string
      - name: offset
        required: false
        in: query
        description: Der initiale Index, von dem die Ergebnisse zurückgegeben werden
          sollen.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Feld, das zum Sortieren der Ergebnisse verwendet werden soll.
        schema:
          type: string
      tags:
      - accounts
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOIDCAPITokenIssuerList'
          description: ''
    post:
      operationId: accounts_token_issuers_oidc_create
