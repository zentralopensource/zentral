{% load ui_extras %}
{% for field in form %}
    {% if field in form.visible_fields %}
        <div class="mb-2 {% if field.widget_type == 'checkbox' %}me-4 form-checkbox{% else %}me-2 form-floating{% endif %}">
            {% if field.widget_type == 'select' %}
                <select class="form-select"
                        type="{{ field.widget_type }}"
                        name="{{ field.html_name }}"
                        id="{{ field.id_for_label }}"
                        {% for name, value in field.field.widget.attrs.items %} {% comment %} We avoid "placeholder" because of bootstrap behavior with it {% endcomment %} {% if name != "placeholder" %}{{ name }}={{ value }}{% endif %}
                        {% endfor %}>
                    {% for option, value in field.field.choices %}
                        <option value="{{ option }}"
                                {% if option|to_str == field.value %}selected="selected"{% endif %}>
                            {{ value }}
                        </option>
                    {% endfor %}
                </select>
                {{ field.label_tag }}
            {% elif field.widget_type == 'checkbox' %}
                {{ field.label_tag }}
                <input class="form-check-input"
                       {% if field.value %}checked{% endif %}
                       type="{{ field.widget_type }}"
                       name="{{ field.html_name }}"
                       id="{{ field.id_for_label }}"
                       {% for name, value in field.field.widget.attrs.items %} {% comment %} We avoid "placeholder" because of bootstrap behavior with it {% endcomment %} {% if name != "placeholder" %}{{ name }}={{ value }}{% endif %}
                       {% endfor %}>
            {% else %}
                <input class="form-control"
                       {% if field.widget_type == 'text' %} {% if field.value %}value="{{ field.value }}"{% endif %}
                       {% endif %}
                       type="{{ field.widget_type }}"
                       name="{{ field.html_name }}"
                       id="{{ field.id_for_label }}"
                       {% for name, value in field.field.widget.attrs.items %} {% comment %} We avoid "placeholder" because of bootstrap behavior with it {% endcomment %} {% if name != "placeholder" %}{{ name }}={{ value }}{% endif %}
                       {% endfor %}>
                {{ field.label_tag }}
            {% endif %}
        </div>
    {% endif %}
{% endfor %}
